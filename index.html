        async function startSpherePhase() {
          // Nếu trước đó có hiệu ứng hạt thì chờ 3.4s để xem explosion,
          // còn nếu bỏ morph (chỉ quả cầu) thì không cần chờ.
          if (enableMorphEffect) {
            await sleep(3400);
          } else {
            await sleep(0);
          }
          // fade to black
          const overlay = document.getElementById("transition-overlay");
          overlay.style.opacity = "1";
          await sleep(400);

          // cleanup particles (main + nền 5k) và overlay ảnh morph
          removeMorphImageOverlay();
          if (particleSystem) {
            scene.remove(particleSystem);
            particlesGeometry.dispose();
            particlesMaterial.dispose();
          }
          particleSystem = null;
          particleCount = 0;
          if (backgroundParticleSystem) {
            scene.remove(backgroundParticleSystem);
            backgroundParticlesGeometry.dispose();
            backgroundParticlesMaterial.dispose();
            backgroundParticleSystem = null;
            backgroundParticlesGeometry = null;
            backgroundParticlesMaterial = null;
            backgroundSourcePositions = null;
          }
          scene.fog = null;
          scene.background = new THREE.Color(0x000000);
          bloomPass.strength = 0;
          bloomPass.threshold = 1;
          // Match r128 LinearEncoding behavior: raw sRGB values pass through unchanged
          renderer.outputColorSpace = THREE.LinearSRGBColorSpace;

          // reset camera & controls for sphere
          camera.fov = 75;
          camera.updateProjectionMatrix();
          if (isMobileSP) {
            camera.position.set(0, 0, 16);
          } else {
            camera.position.set(0, 0, 10);
          }
          camera.lookAt(0, 0, 0);
          controls.target.set(0, 0, 0);
          controls.enableRotate = false;
          controls.enableZoom = true;
          controls.enablePan = false;
          controls.minDistance = isMobileSP ? 5 : 6;
          controls.maxDistance = isMobileSP ? 24 : 18;
          controls.autoRotate = false;
          controls.minPolarAngle = Math.PI * 0.25;
          controls.maxPolarAngle = Math.PI * 0.75;
          controls.minAzimuthAngle = -Math.PI * 0.45;
          controls.maxAzimuthAngle = Math.PI * 0.45;
          controls.update();

          // hide start-wrap, info panel
          document.getElementById("start-wrap").style.display = "none";
          document.getElementById("ui").style.display = "none";

          // build sphere objects
          spGroup = new THREE.Group();
          scene.add(spGroup);
          spClickSphere = new THREE.Mesh(
            new THREE.SphereGeometry(SP_RADIUS * 1.1, 32, 32),
            new THREE.MeshBasicMaterial({
              transparent: true,
              opacity: 0,
              side: THREE.DoubleSide,
              depthWrite: false,
            }),
          );
          spClickSphere.renderOrder = -1;
          scene.add(spClickSphere);
          spRaycaster = new THREE.Raycaster();
          spMouse = new THREE.Vector2();

          // sphere particles halo
          const sCnt = 600,
            sPos = new Float32Array(sCnt * 3),
            sCol = new Float32Array(sCnt * 3);
          for (let i = 0; i < sCnt; i++) {
            const t2 = Math.random() * Math.PI * 2,
              p2 = Math.acos(2 * Math.random() - 1),
              r2 = SP_RADIUS * 1.2 + Math.random() * 3;
            sPos[i * 3] = r2 * Math.sin(p2) * Math.cos(t2);
            sPos[i * 3 + 1] = r2 * Math.cos(p2);
            sPos[i * 3 + 2] = r2 * Math.sin(p2) * Math.sin(t2);
            sCol[i * 3] = 1;
            sCol[i * 3 + 1] = 0.4 + Math.random() * 0.3;
            sCol[i * 3 + 2] = 0.7 + Math.random() * 0.3;
          }
          const sGeo = new THREE.BufferGeometry();
          sGeo.setAttribute("position", new THREE.BufferAttribute(sPos, 3));
          sGeo.setAttribute("color", new THREE.BufferAttribute(sCol, 3));
          spParticlesMesh = new THREE.Points(
            sGeo,
            new THREE.PointsMaterial({
              size: 0.04,
              vertexColors: true,
              transparent: true,
              opacity: 0.8,
            }),
          );
          scene.add(spParticlesMesh);

          // rain up
          const rPos = new Float32Array(SP_RAIN_COUNT * 3),
            rCol = new Float32Array(SP_RAIN_COUNT * 3);
          for (let i = 0; i < SP_RAIN_COUNT; i++) {
            rPos[i * 3] = (Math.random() - 0.5) * 2 * SP_FLYOUT_BOUND;
            rPos[i * 3 + 1] =
              -SP_FLYOUT_BOUND + Math.random() * 2 * SP_FLYOUT_BOUND;
            rPos[i * 3 + 2] = (Math.random() - 0.5) * 2 * SP_FLYOUT_BOUND;
            rCol[i * 3] = 1;
            rCol[i * 3 + 1] = 0.4 + Math.random() * 0.3;
            rCol[i * 3 + 2] = 0.7 + Math.random() * 0.3;
          }
          spRainPositions = rPos;
          const rGeo = new THREE.BufferGeometry();
          rGeo.setAttribute("position", new THREE.BufferAttribute(rPos, 3));
          rGeo.setAttribute("color", new THREE.BufferAttribute(rCol, 3));
          spRainMesh = new THREE.Points(
            rGeo,
            new THREE.PointsMaterial({
              size: 0.035,
              vertexColors: true,
              transparent: true,
              opacity: 0.75,
            }),
          );
          spRainMesh.renderOrder = 998;
          scene.add(spRainMesh);

          // CSS particles background
          const bg = document.getElementById("sphere-particles-bg");
          for (let i = 0; i < 30; i++) {
            const d = document.createElement("div");
            d.className = "sp-particle";
            d.style.left = Math.random() * 100 + "%";
            d.style.animationDelay = Math.random() * 15 + "s";
            d.style.animationDuration = 10 + Math.random() * 10 + "s";
            bg.appendChild(d);
          }
          bg.style.opacity = "1";

          // load textures then build sphere
          const loader = new THREE.TextureLoader();
          loader.crossOrigin = "anonymous";
          Promise.all(
            SPHERE_IMAGES.map(
              (url) =>
                new Promise((res) =>
                  loader.load(url, res, undefined, () => res(null)),
                ),
            ),
          ).then((textures) => {
            spTextures = textures.filter(Boolean);
            if (!spTextures.length) {
              const fc = document.createElement("canvas");
              fc.width = fc.height = 64;
              fc.getContext("2d").fillStyle = "#ff69b4";
              fc.getContext("2d").fillRect(0, 0, 64, 64);
              spTextures = [new THREE.CanvasTexture(fc)];
            }
            // Match r128: treat textures as linear (no sRGB decode) — raw values pass through
            spTextures.forEach((t) => {
              t.colorSpace = THREE.LinearSRGBColorSpace;
              t.needsUpdate = true;
            });
            spBuildSphere();
            spPhase = true;

            // tap handlers
            const canvasEl = renderer.domElement;
            function spDown(e) {
              const c = e.touches?.[0] || e;
              spMouseDownX = c.clientX;
              spMouseDownY = c.clientY;
              spIsPointerDown = true;
              spWasDrag = false;
            }
            function spMove(e) {
              const c = e.touches?.[0] || e;
              if (spIsPointerDown) {
                if (
                  Math.hypot(
                    c.clientX - spMouseDownX,
                    c.clientY - spMouseDownY,
                  ) > SP_DRAG_THRESHOLD
                )
                  spWasDrag = true;
              }
            }
            function spUp() {
              spIsPointerDown = false;
            }
            canvasEl.addEventListener("mousedown", spDown);
            canvasEl.addEventListener("mouseup", spUp);
            canvasEl.addEventListener("mouseleave", spUp);
            canvasEl.addEventListener("mousemove", spMove);
            canvasEl.addEventListener("click", (e) =>
              spHandleTap(e.clientX, e.clientY),
            );
            canvasEl.addEventListener("touchstart", spDown, { passive: true });
            canvasEl.addEventListener("touchmove", spMove, { passive: true });
            canvasEl.addEventListener(
              "touchend",
              (e) => {
                spUp();
                if (e.cancelable) e.preventDefault();
                const c = e.changedTouches[0];
                spHandleTap(c.clientX, c.clientY);
              },
              { passive: false },
            );

            document
              .getElementById("btn-flying-corner")
              .addEventListener("click", () => {
                if (!spIsExploded || spIsFinalFlyUp) return;
                spIsFinalFlyUp = true;
                spFinalFlyUpStartTime = Date.now();
                document
                  .getElementById("sphere-click-hint")
                  .classList.remove("visible");
                document
                  .getElementById("btn-flying-corner")
                  .classList.remove("visible");
                bg.style.opacity = "0";
                startCupidLetterSequence();
              });

            // fade overlay out
            overlay.style.opacity = "0";
          });
        }

        function updateSpherePhase() {
          spTime += 0.01;
          // hints
          if (
            spIntroComplete &&
            !spHintClickShown &&
            spIntroCompleteTime > 0 &&
            Date.now() - spIntroCompleteTime >= SP_HINT_DELAY_MS
          ) {
            spHintClickShown = true;
            spShowHint("Жмак ещё раз");
          }
          if (
            spHasZoomedIn &&
            !spIsExploded &&
            !spHintFlyShown &&
            spZoomInTime > 0 &&
            Date.now() - spZoomInTime >= SP_HINT_DELAY_MS
          ) {
            spHintFlyShown = true;
            spShowHint("Жмак ещё раз");
          }
          // rain
          if (spRainMesh && spRainPositions) {
            const n = spRainPositions.length / 3;
            for (let j = 0; j < n; j++) {
              spRainPositions[j * 3 + 1] += SP_RAIN_SPEED;
              if (spRainPositions[j * 3 + 1] > 6) {
                spRainPositions[j * 3 + 1] = -SP_FLYOUT_BOUND;
                spRainPositions[j * 3] =
                  (Math.random() - 0.5) * 2 * SP_FLYOUT_BOUND;
                spRainPositions[j * 3 + 2] =
                  (Math.random() - 0.5) * 2 * SP_FLYOUT_BOUND;
              }
            }
            spRainMesh.geometry.attributes.position.needsUpdate = true;
          }
          // explosion / floating
          if (spIsExploded) {
            spExplosionProgress = Math.min(1, spExplosionProgress + 0.018);
            spFadeProgress = Math.min(1, spFadeProgress + 0.04);
            spGroup.children.forEach((child) => {
              if (child.material) {
                child.material.opacity = Math.max(0, 1 - spFadeProgress);
                if (child.material.opacity <= 0) child.visible = false;
              }
            });
            spClickSphere.visible = false;
            if (spFloatingGroup) {
              spDriftTiltAngle += spDriftTiltDir * 0.0003;
              if (spDriftTiltAngle >= 0.25) {
                spDriftTiltAngle = 0.25;
                spDriftTiltDir = -1;
              } else if (spDriftTiltAngle <= -0.25) {
                spDriftTiltAngle = -0.25;
                spDriftTiltDir = 1;
              }
              spFloatingGroup.rotation.y = spDriftTiltAngle;
            }
            const maxY = 10,
              minY = -10,
              fMaxY = 25;
            spFloatingImages.forEach((img, idx) => {
              const d = img.userData,
                dp = Math.max(
                  0,
                  (spExplosionProgress - d.delay) / (1 - d.delay),
                );
              if (dp > 0) {
                const t = Math.min(1, dp),
                  eased = 1 - Math.pow(1 - t, 2);
                const fY = spIsFinalFlyUp
                  ? 0
                  : Math.sin(spTime * 2 * d.floatSpeedY + d.floatPhase) *
                    d.floatAmplY;
                const elapsed = (Date.now() - spExplosionStartTime) / 1000;
                const FAST = isMobileSP ? 25 : 18,
                  FTAPER = isMobileSP ? 4 : 2.5,
                  TEND = isMobileSP ? 7 : 5;
                let dm = spIsFinalFlyUp
                  ? 80
                  : elapsed < FTAPER
                    ? FAST
                    : elapsed < TEND
                      ? FAST -
                        ((FAST - 1) * (elapsed - FTAPER)) / (TEND - FTAPER)
                      : 1;
                d.basePos.y += d.driftSpeed * dm;
                if (eased < 1) {
                  img.position.x =
                    d.startPos.x + (d.targetPos.x - d.startPos.x) * eased;
                  img.position.z =
                    d.startPos.z + (d.targetPos.z - d.startPos.z) * eased;
                  img.position.y =
                    d.startPos.y +
                    (d.targetPos.y - d.startPos.y) * eased +
                    (d.basePos.y - d.targetPos.y) +
                    fY;
                } else {
                  img.position.x = d.basePos.x;
                  img.position.y = d.basePos.y + fY;
                  img.position.z = d.baseZ;
                }
                if (spIsFinalFlyUp) {
                  if (d.basePos.y >= fMaxY) img.visible = false;
                } else {
                  if (d.basePos.y > maxY) {
                    d.basePos.y = minY;
                    d.basePos.x = (Math.random() - 0.5) * 16;
                    d.baseZ = (Math.random() - 0.5) * 16;
                    img.position.x = d.basePos.x;
                    img.position.z = d.baseZ;
                  }
                }
                const op = Math.min(1, dp * 2),
                  gp = 0.65 + Math.sin(spTime * 3 + idx * 0.5) * 0.25;
                d.iMat.opacity = op;
                d.gMat.opacity = Math.min(1, op * gp);
                d.goMat.opacity = Math.min(1, op * gp * 0.75);
              }
            });
          } else if (spIntroComplete) {
            if (spNeedZoomIn) {
              camera.position.lerp(spZoomInTarget, 0.08);
              if (
                camera.position.distanceTo(controls.target) <=
                controls.minDistance + 0.05
              )
                spNeedZoomIn = false;
            }
            spGroup.rotation.y += 0.001;
            if (spParticlesMesh) {
              spParticlesMesh.rotation.y += 0.0005;
              spParticlesMesh.rotation.x += 0.00025;
            }
          }
          // intro
          if (!spIntroComplete && spIntroStartTime > 0 && spMeshes.length > 0) {
            const elapsed = Date.now() - spIntroStartTime,
              dur = SP_INTRO_DURATION_MS / 1000;
            spMeshes.forEach((mesh) => {
              const delay = (mesh.userData.introDelay || 0) / 1000,
                t = Math.min(1, Math.max(0, (elapsed / 1000 - delay) / dur));
              const eased = 1 - Math.pow(1 - t, 1.4);
              mesh.position.lerpVectors(
                mesh.userData.introStartPos,
                new THREE.Vector3(0, 0, 0),
                eased,
              );
              if (mesh.material) mesh.material.opacity = 1;
            });
            if (elapsed > SP_INTRO_DURATION_MS + SP_INTRO_STAGGER_MS) {
              spIntroComplete = true;
              spIntroCompleteTime = Date.now();
              spMeshes.forEach((m) => {
                m.position.set(0, 0, 0);
                if (m.material) {
                  m.material.opacity = 1;
                  m.visible = true;
                }
              });
            }
          }
        }
        // ════════════════════════════════════════════════════════════════

        // ════════════════════════════════════════════════════════════════
        // Áp dụng config vào head (title, icon, passcode UI)
        // ════════════════════════════════════════════════════════════════
        (function applyCfgToDOM() {
          const title =
            enableWebsiteInfo && cfg.appTitle ? cfg.appTitle : "Beloved eyes";
          document.title = title;
          const metaTitle = document.querySelector(
            'meta[name="apple-mobile-web-app-title"]',
          );
          if (metaTitle) metaTitle.content = title;

          const iconSrc =
            enableWebsiteInfo && cfg.appIcon
              ? cfg.appIcon
              : "assets/images/icons/couple.png";
          document
            .querySelectorAll('link[rel*="apple-touch-icon"], link[rel="icon"]')
            .forEach((el) => (el.href = iconSrc));

          const passcodeTitle = document.querySelector(".passcode-title");
          const passcodeSubtitle = document.querySelector(".passcode-subtitle");
          if (passcodeTitle && cfg.passcodeTitle)
            passcodeTitle.textContent = cfg.passcodeTitle;
          if (passcodeSubtitle && cfg.passcodeSubtitle)
            passcodeSubtitle.textContent = cfg.passcodeSubtitle;
        })();

        // ════════════════════════════════════════════════════════════════
        // PWA Manifest (Android only, iOS dùng apple-touch-icon)
        // ════════════════════════════════════════════════════════════════
        (function () {
          var isIOS =
            /iPad|iPhone|iPod/.test(navigator.userAgent) ||
            (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
          if (isIOS) return;
          var link = document.createElement("link");
          link.rel = "manifest";
          link.id = "linkManifest";
          document.head.appendChild(link);
          var iconSrc = cfg.appIcon || "assets/images/icons/couple.png";
          var iconUrl = new URL(iconSrc, window.location.href).href;
          var name = cfg.appTitle || "Beloved eyes";
          var manifest = {
            name,
            short_name: name,
            description: "...?",
            start_url: "./",
            display: "standalone",
            orientation: "portrait",
            background_color: "#1b0a1c",
            theme_color: "#1b0a1c",
            scope: "./",
            icons: [
              {
                src: iconUrl,
                sizes: "192x192",
                type: "image/png",
                purpose: "any maskable",
              },
              {
                src: iconUrl,
                sizes: "512x512",
                type: "image/png",
                purpose: "any maskable",
              },
            ],
          };
          try {
            var blob = new Blob([JSON.stringify(manifest)], {
              type: "application/json",
            });
            link.href = URL.createObjectURL(blob);
          } catch (e) {}
        })();

        // ════════════════════════════════════════════════════════════════
        // NHẠC NỀN
        // ════════════════════════════════════════════════════════════════
        const bgMusic = new Audio(cfg.bgMusic || "assets/music/bgmucsic.mp3");
        bgMusic.loop = true;
        bgMusic.volume = typeof cfg.bgVolume === "number" ? cfg.bgVolume : 0.55;
        bgMusic.preload = "auto";

        function startBgMusic() {
          try {
            bgMusic.currentTime = 0;
            var vol = typeof cfg.bgVolume === "number" ? cfg.bgVolume : 0.55;
            bgMusic.volume = 0;
            bgMusic.play();
            bgMusic.volume = vol;
            bgMusic.play();
          } catch (e) {
            console.warn("Фоновая музыка не воспроизводится", e);
          }
        }
        function stopBgMusic() {
          try {
            bgMusic.pause();
            bgMusic.currentTime = 0;
          } catch (e) {
            console.warn("Не могу остановить фоновую музыку:", e);
          }
        }
        // ════════════════════════════════════════════════════════════════
        // PASSCODE
        // ════════════════════════════════════════════════════════════════
        const PASSCODE = cfg.passcode || "2810";
        let passcodeInput = "";

        const passcodeScreen = document.getElementById("passcodeScreen");
        const passcodeDots = document.getElementById("passcodeDots");
        const passcodeBears = document.getElementById("passcodeBears");
        const bearLeft = document.getElementById("bearLeft");
        const bearRight = document.getElementById("bearRight");

        // Nếu tắt passcode: ẩn màn hình mật khẩu, khởi động thẳng
        if (!enablePasscode) {
          passcodeScreen.style.display = "none";
          // Nhạc sẽ phát khi user giữ nút Start (startHold) – tránh autoplay bị chặn trên mobile
          init();
        } else {
          // Hiện passcode ngay khi tải trang
          passcodeScreen.classList.add("visible");
        }

        function updatePasscodeDots() {
          const dots = passcodeDots.querySelectorAll(".passcode-dot");
          dots.forEach((dot, i) => {
            dot.classList.remove("filled", "error");
            if (i < passcodeInput.length) dot.classList.add("filled");
          });
        }

        function updateBearPosition() {
          const pos = passcodeInput.length;
          bearLeft.className = `passcode-bear left pos-${pos}`;
          bearRight.className = `passcode-bear right pos-${pos}`;
        }

        function showPasscodeError() {
          const dots = passcodeDots.querySelectorAll(".passcode-dot");
          dots.forEach((d) => d.classList.add("error"));
          bearLeft.className = "passcode-bear left pos-0";
          bearRight.className = "passcode-bear right pos-0";
          setTimeout(() => {
            passcodeInput = "";
            dots.forEach((d) => d.classList.remove("filled", "error"));
          }, 500);
        }

        function openGift() {
          passcodeBears.classList.add("show-couple");
          // Nhạc chỉ phát khi user giữ nút "Giữ để bắt đầu", không phát khi mở khóa
          setTimeout(() => {
            passcodeScreen.classList.add("hiding");
            setTimeout(() => {
              passcodeScreen.classList.remove("visible", "hiding");
              passcodeBears.classList.remove("show-couple");
              init();
            }, 500);
          }, 2200);
        }

        document.querySelectorAll(".passcode-btn[data-num]").forEach((btn) => {
          btn.addEventListener("click", () => {
            if (passcodeInput.length >= 4) return;
            passcodeInput += btn.dataset.num;
            updatePasscodeDots();
            updateBearPosition();
            if (passcodeInput.length === 4) {
              if (passcodeInput === PASSCODE) {
                openGift();
              } else {
                showPasscodeError();
              }
            }
          });
        });

        document
          .getElementById("passcodeCancel")
          .addEventListener("click", () => {
            passcodeInput = "";
            updatePasscodeDots();
            updateBearPosition();
          });

        // Chặn pinch zoom trên passcode
        passcodeScreen.addEventListener(
          "touchmove",
          (e) => {
            if (e.touches.length > 1) e.preventDefault();
          },
          { passive: false },
        );

        // Listener cho click phong bì lá thư (hoạt động cả khi không có sphere)
        document
          .getElementById("letter-envelope-img")
          ?.addEventListener("click", handleLetterEnvelopeClick);
      })(); // end async IIFE
    </script>
  </body>
</html>
